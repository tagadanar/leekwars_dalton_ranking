<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalton Ranking - LeekWars</title>
    <meta property="og:title" content="The Daltons — Wanted Ranking">
    <meta property="og:description" content="Beat them at the lowest level possible. LeekWars challenge ranking.">
    <meta property="og:image" content="https://tagadanar.github.io/leekwars_dalton_ranking/hero-bg.jpg">
    <meta property="og:url" content="https://tagadanar.github.io/leekwars_dalton_ranking/">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#261c12">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <img src="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/weapon/shotgun.png"
                 alt="" class="hero-weapon hero-weapon-left">
            <img src="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/weapon/shotgun.png"
                 alt="" class="hero-weapon hero-weapon-right">
            <div class="wanted-frame">
                <p class="wanted-label">WANTED</p>
                <h1>The Daltons</h1>
                <div class="dalton-lineup">
                    <div class="dalton-mugshot" data-egg="shoot">
                        <div class="leek-with-hat">
                            <img src="https://leekwars.com/image/leek/svg/leek_11_front_dalton_angry.svg" alt="Joe" class="leek-body">
                            <img src="https://leekwars.com/image/hat/fedora.png" alt="" class="leek-hat hat-fedora">
                            <img src="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/weapon/pistol.png" alt="" class="joe-pistol">
                        </div>
                        <span>Joe</span>
                    </div>
                    <div class="dalton-mugshot" data-egg="wobble">
                        <div class="leek-with-hat">
                            <img src="https://leekwars.com/image/leek/svg/leek_11_front_dalton_metal.svg" alt="William" class="leek-body">
                        </div>
                        <span>William</span>
                    </div>
                    <div class="dalton-mugshot" data-egg="summon">
                        <div class="leek-with-hat">
                            <img src="https://leekwars.com/image/leek/svg/leek_11_front_dalton.svg" alt="Jack" class="leek-body">
                            <img src="https://leekwars.com/image/hat/panama.png" alt="" class="leek-hat hat-panama">
                            <img src="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/bulb/lightning_bulb_front.png" alt="" class="jack-bulb bulb-1">
                            <img src="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/bulb/healer_bulb_front.png" alt="" class="jack-bulb bulb-2">
                            <img src="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/bulb/puny_bulb_front.png" alt="" class="jack-bulb bulb-3">
                        </div>
                        <span>Jack</span>
                    </div>
                    <div class="dalton-mugshot" data-egg="bounce">
                        <div class="leek-with-hat">
                            <img src="https://leekwars.com/image/leek/svg/leek_11_front_dalton_metal_happy.svg" alt="Averell" class="leek-body">
                            <img src="https://leekwars.com/image/hat/sombrero.png" alt="" class="leek-hat hat-sombrero">
                        </div>
                        <span>Averell</span>
                    </div>
                </div>
                <div id="most-wanted" class="most-wanted" style="display:none"></div>
                <p class="reward">REWARD: Eternal Glory</p>
                <p class="subtitle">Beat them at the lowest level possible.<br>Ties broken by fewest turns.</p>
            </div>
        </div>
    </div>

    <nav class="section-nav" id="section-nav"></nav>

    <div class="search-bar" id="search-bar" style="display:none">
        <input type="text" id="farmer-search" placeholder="Search farmer..." autocomplete="off">
        <input type="text" id="my-farmer" placeholder="Your farmer name (saved)" autocomplete="off">
    </div>

    <main id="content">
        <p class="loading">Loading rankings...</p>
    </main>

    <footer>
        <img src="https://raw.githubusercontent.com/leek-wars/leek-wars/master/public/image/logo.png"
             alt="LeekWars" class="footer-logo">
        <p id="next-update">Auto-updates every hour</p>
        <p class="last-updated" id="last-updated"></p>
        <p><a href="https://leekwars.com" target="_blank">LeekWars</a> &middot; <a href="https://leekwars.com/farmer/42851" target="_blank">tagadalton</a></p>
        <p>Photo by <a href="https://unsplash.com/photos/JdAdYrzjX2c" target="_blank">Unsplash</a></p>
    </footer>

    <a href="#" class="back-to-top" id="back-to-top" title="Back to top">&#9650;</a>
    <script src="app.js"></script>
</body>
</html>
